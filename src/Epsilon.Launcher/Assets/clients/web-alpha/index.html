<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Epsilon Hotel | Loader del juego</title>
  <link rel="stylesheet" href="./assets/client.css">
</head>
<body>
  <main class="client-shell">
    <section class="hero-panel">
      <div>
        <p class="eyebrow">Epsilon Hotel</p>
        <h1>Loader del juego</h1>
        <p id="hero-copy" class="lede">Conectando tu sesión al hotel.</p>
      </div>
      <div class="hero-meta">
        <div class="meta-chip">
          <span>Sesión</span>
          <strong id="session-chip">validando</strong>
        </div>
        <div class="meta-chip">
          <span>Estado</span>
          <strong id="status-chip">cargando</strong>
        </div>
      </div>
    </section>

    <section class="layout-grid">
      <article class="panel stage-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Hotel</p>
            <h2 id="room-name">Preparando entrada</h2>
          </div>
          <div id="room-state-pill" class="state-pill neutral">sin sala</div>
        </div>
        <div class="world-meta">
          <div class="world-card">
            <span>Layout</span>
            <strong id="layout-label">-</strong>
          </div>
          <div class="world-card">
            <span>Actores</span>
            <strong id="actors-label">0</strong>
          </div>
          <div class="world-card">
            <span>Items</span>
            <strong id="items-label">0</strong>
          </div>
        </div>
        <div class="room-frame">
          <div class="room-stage-header">
            <strong>Presencia en sala</strong>
            <span id="presence-copy">Cargando...</span>
          </div>
          <div id="actors-grid" class="actors-grid"></div>
        </div>
      </article>

      <aside class="sidebar-stack">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Cuenta</p>
              <h2 id="username-label">Conectando…</h2>
            </div>
          </div>
          <dl class="summary-list">
            <div><dt>Public ID</dt><dd id="public-id-label">-</dd></div>
            <div><dt>Collector</dt><dd id="collector-label">-</dd></div>
            <div><dt>Misión</dt><dd id="motto-label">-</dd></div>
          </dl>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Chat</p>
              <h2>Sala activa</h2>
            </div>
          </div>
          <div id="chat-feed" class="chat-feed"></div>
          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" maxlength="100" placeholder="Escribe un mensaje" autocomplete="off">
            <button type="submit">Enviar</button>
          </form>
        </article>
      </aside>
    </section>
  </main>
  <script src="./assets/client.js"></script>
</body>
</html>
