<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Epsilon Hotel</title>
  <link rel="stylesheet" href="./assets/portal.css?v=7">
</head>
<body data-page="login">
  <header class="masthead compact">
    <div class="masthead-overlay">
      <div class="masthead-inner">
        <a class="brand" href="/sites/epsilon-access/">
          <span class="brand-mark">EPSILON</span>
          <span class="brand-copy">Hotel</span>
        </a>
        <div class="masthead-actions">
          <a class="button-link soft" href="/sites/epsilon-access/register.html">Register</a>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav-bar">
    <div class="site-shell nav-row">
      <div class="topnav">
        <a href="/sites/epsilon-access/">Homepage</a>
        <a href="/sites/epsilon-access/#community">Community</a>
        <a href="/sites/epsilon-access/#photos">Fotos</a>
        <a href="/sites/epsilon-access/#news">Noticias</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <section class="auth-card">
      <div class="card-title">
        <h2>Login</h2>
      </div>
      <div id="status-banner" class="notice hidden"></div>
      <form class="stack" method="post" action="/portal/login">
        <label>Username<input id="login-name" name="loginName" required autocomplete="username" placeholder="Nombre Habbo"></label>
        <label>Password<input name="password" type="password" required autocomplete="current-password" placeholder="Contraseña"></label>
        <div class="actions stacked-actions">
          <button type="submit">Login</button>
          <a class="button-link soft" href="/sites/epsilon-access/register.html">Register</a>
        </div>
      </form>
    </section>
  </main>
  <script src="./assets/site.js?v=3" defer></script>
</body>
</html>
