<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Epsilon Hotel</title>
  <link rel="stylesheet" href="./assets/portal.css?v=9">
</head>
<body data-page="login">
  <header class="masthead compact">
    <div class="masthead-overlay">
      <div class="site-shell masthead-top compact-top">
        <a class="brand" href="/sites/epsilon-access/">
          <span class="brand-mark">EPSILON</span>
          <span class="brand-copy">Hotel</span>
        </a>
        <div class="masthead-actions">
          <a class="button-link soft" href="/sites/epsilon-access/register.html">Crear cuenta</a>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav-bar">
    <div class="site-shell nav-row">
      <div class="topnav">
        <a href="/sites/epsilon-access/">Inicio</a>
        <a href="/sites/epsilon-access/#community">Comunidad</a>
        <a href="/sites/epsilon-access/#news">Noticias</a>
        <a href="/sites/epsilon-access/#help">Ayuda</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <section class="auth-layout">
      <article class="auth-info-card">
        <p class="hero-eyebrow">Acceso</p>
        <h1>Entra a tu cuenta.</h1>
        <p>La CMS solo prepara tu cuenta y tu acceso. El juego se abrirá después desde la app de Epsilon.</p>
      </article>
      <section class="auth-card">
        <div class="card-title">
          <h2>Login</h2>
        </div>
        <div id="status-banner" class="notice hidden"></div>
        <form class="stack" method="post" action="/portal/login">
          <label>Username<input id="login-name" name="loginName" required autocomplete="username" placeholder="Nombre Habbo"></label>
          <label>Password<input name="password" type="password" required autocomplete="current-password" placeholder="Contraseña"></label>
          <div class="actions stacked-actions">
            <button type="submit">Entrar</button>
            <a class="button-link soft" href="/sites/epsilon-access/register.html">Crear cuenta</a>
          </div>
        </form>
      </section>
    </section>
  </main>
  <script src="./assets/site.js?v=6" defer></script>
</body>
</html>
